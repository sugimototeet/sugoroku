<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>かんたん じんせいゲーム</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { margin: 0; height: 100%; overflow: hidden; touch-action: manipulation; }
  body {
    font-family: "Hiragino Maru Gothic ProN", "Rounded Mplus 1c", sans-serif;
    background: #eafaff;
    display: flex; flex-direction: column; align-items: center;
    height: 100dvh; color: #4e342e;
  }
  h1 { margin: 2px 0 0; font-size: min(5vmin, 4.2dvh); color: #ff7043; text-shadow: 2px 2px 0 #fff; }

  #turn {
    margin: 3px 0; padding: 4px 20px; border-radius: 30px;
    font-size: min(4.4vmin, 3.4dvh); color: #fff; font-weight: bold;
    box-shadow: 0 3px 0 rgba(0,0,0,.2); min-width: 40vmin; text-align: center;
  }

  #board { position: relative; width: 96vw; height: min(46vmin, 38dvh);
           border-radius: 3vmin; overflow: hidden; box-shadow: 0 1vmin 2vmin rgba(0,0,0,.2);
           background: linear-gradient(#79c6ff 0%, #b7e6ff 55%, #ddf5ff 100%); }
  #board .sun { position: absolute; left: 6vmin; top: 4vmin; width: 11vmin; height: 11vmin;
           border-radius: 50%; z-index: 1;
           background: radial-gradient(circle at 40% 40%, #fff6c0, #ffd54f);
           box-shadow: 0 0 5vmin #ffe08299; }
  #world { position: absolute; top: 0; left: 0; height: 100%; z-index: 2;
           transform: translateX(0); transition: transform .55s ease; }
  #world > svg { display: block; height: 100%; width: 100%; }

  .token {
    position: absolute; width: 6.4vmin; height: 6.4vmin; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
    font-size: 3.4vmin; line-height: 1; text-align: center;
    border: 0.6vmin solid #fff; z-index: 10;
    transform: translate(-50%, -100%);
    transition: left .42s cubic-bezier(.34,1.56,.64,1), top .42s cubic-bezier(.34,1.56,.64,1);
    box-shadow: 0 0.4vmin 0.7vmin rgba(0,0,0,.4);
  }
  .token.current { width: 7.6vmin; height: 7.6vmin; font-size: 4vmin; z-index: 11;
    box-shadow: 0 0 0 0.5vmin #fff, 0 0 3vmin gold; animation: bob .8s infinite; }
  @keyframes bob { 0%,100%{transform:translate(-50%,-100%)} 50%{transform:translate(-50%,-124%)} }

  #status { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin: 5px 0; }
  .chip { display: flex; align-items: center; gap: 5px; padding: 3px 12px; border-radius: 20px;
    background: #fff; font-size: min(3.6vmin, 2.8dvh); box-shadow: 0 2px 0 rgba(0,0,0,.12); }
  .chip .dot { width: 3vmin; height: 3vmin; border-radius: 50%; border: 2px solid #fff; }
  .chip.act { outline: 0.6vmin solid gold; }

  #diceWrap { margin-top: 4px; perspective: 75vmin; cursor: pointer; padding: 1vmin 2vmin 2vmin; }
  #diceWrap.off { opacity: .5; pointer-events: none; }
  #diceWrap:active .scene { transform: scale(.96); }
  .scene { --sz: min(20vmin, 15dvh); width: var(--sz); height: var(--sz); position: relative;
    transform-style: preserve-3d; }
  .scene.throw { animation: throw 1.2s ease; }
  @keyframes throw {
    0%,100% { transform: translateY(0) scale(1); }
    22% { transform: translateY(-8vmin) scale(1.08); }
    58% { transform: translateY(0.6vmin) scale(.96); }
    78% { transform: translateY(-2vmin) scale(1.02); }
  }
  .cube { width: 100%; height: 100%; position: absolute; transform-style: preserve-3d;
    transform: rotateX(-22deg) rotateY(24deg);
    transition: transform 1.15s cubic-bezier(.22,.85,.28,1); }
  .cube .face { position: absolute; width: 100%; height: 100%; box-sizing: border-box;
    background: linear-gradient(140deg,#ffffff 0%,#eceff1 100%);
    border-radius: 15%; border: 0.4vmin solid #d7dade;
    display: grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr);
    padding: 13%; box-shadow: inset 0 0 2vmin rgba(0,0,0,.08); }
  .cube .cell { display: flex; align-items: center; justify-content: center; }
  .cube .pip { width: 68%; height: 68%; border-radius: 50%;
    background: radial-gradient(circle at 34% 32%, #5a5f66, #16181c);
    box-shadow: inset 0 -0.2vmin 0.3vmin rgba(0,0,0,.5); }
  .cube .face.f1 .pip { background: radial-gradient(circle at 34% 32%, #ff6b6b, #b71c1c); }
  .cube .front  { transform: translateZ(calc(var(--sz)/2)); }
  .cube .back   { transform: rotateY(180deg) translateZ(calc(var(--sz)/2)); }
  .cube .right  { transform: rotateY(90deg)  translateZ(calc(var(--sz)/2)); }
  .cube .left   { transform: rotateY(-90deg) translateZ(calc(var(--sz)/2)); }
  .cube .top    { transform: rotateX(90deg)  translateZ(calc(var(--sz)/2)); }
  .cube .bottom { transform: rotateX(-90deg) translateZ(calc(var(--sz)/2)); }
  #hint { font-size: min(4.2vmin, 3.2dvh); min-height: min(5vmin, 4dvh); margin: 1px 0; }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 50;
    display: none; align-items: center; justify-content: center; flex-direction: column; }
  .overlay.show { display: flex; }
  .panel { background: #fffef7; border-radius: 5vmin; padding: 4vmin 5vmin; text-align: center;
    box-shadow: 0 2vmin 4vmin rgba(0,0,0,.3); max-width: 92vw; max-height: 92dvh; overflow-y: auto; }
  .panel h2 { margin: 0 0 3vmin; font-size: 6vmin; color: #ff7043; }
  .cards { display: flex; gap: 3vmin; justify-content: center; flex-wrap: wrap; }
  .pcard { width: 26vmin; padding: 3vmin 0; border-radius: 4vmin; background: #eee;
    border: 0.8vmin solid transparent; cursor: pointer; transition: transform .1s; }
  .pcard:active { transform: scale(.95); }
  .pcard .face { font-size: 11vmin; }
  .pcard .nm { font-size: 5vmin; font-weight: bold; }
  .pcard.sel { border-color: #333; box-shadow: 0 0 0 0.6vmin #fff, 0 0 4vmin gold; }
  .pcard .chk { font-size: 5vmin; height: 6vmin; color: #2e7d32; }
  .bigbtn { margin-top: 5vmin; font-size: 6vmin; padding: 3vmin 10vmin; border: none;
    border-radius: 6vmin; background: #ffca28; color: #4e342e; cursor: pointer;
    box-shadow: 0 1.2vmin 0 #f9a825; font-weight: bold; }
  .bigbtn:disabled { opacity: .4; box-shadow: none; }
  .note { margin-top: 2vmin; font-size: 3.4vmin; color: #888; }

  #win .panel .big { font-size: 18vmin; }
  #win .panel .who { font-size: 8vmin; font-weight: bold; margin: 2vmin 0; }
  #win .row { display: flex; gap: 3vmin; justify-content: center; flex-wrap: wrap; }
  .confetti { position: fixed; top: -6vmin; font-size: 6vmin; z-index: 60;
    animation: fall linear forwards; pointer-events: none; }
  @keyframes fall { to { transform: translateY(115vh) rotate(720deg); } }
</style>

<h1>🚗 かんたん じんせいゲーム 🏁</h1>
<div id="turn">よういはいい？</div>
<div id="board"></div>
<div id="status"></div>
<div id="hint"></div>
<div id="diceWrap" class="off"><div class="scene"><div class="cube" id="cube"></div></div></div>

<div id="setup" class="overlay show">
  <div class="panel">
    <h2>だれが あそぶ？</h2>
    <div class="cards" id="cards"></div>
    <p class="note">タップして えらんでね（2〜4にん）</p>
    <h2 style="margin-top:3vmin">どこへ いく？</h2>
    <div class="cards" id="stageCards"></div>
    <button class="bigbtn" id="startBtn" onclick="startGame()" disabled>スタート！</button>
  </div>
</div>

<div id="win" class="overlay">
  <div class="panel">
    <div class="big">🎉🏆🎉</div>
    <div class="who" id="winWho">ゴール！</div>
    <div class="row">
      <button class="bigbtn" onclick="replay()">もういちど</button>
      <button class="bigbtn" style="background:#8bc34a;box-shadow:0 1.2vmin 0 #558b2f" onclick="showSetup()">メンバーをかえる</button>
    </div>
  </div>
</div>

<script>
/* ===== プレイヤー ===== */
const ALL_PLAYERS = [
  { key:'momo', name:'もも', emoji:'🍑', color:'#ff5c8a' },
  { key:'mama', name:'ママ', emoji:'👩', color:'#7c4dff' },
  { key:'papa', name:'パパ', emoji:'👨', color:'#2196f3' },
  { key:'hina', name:'ひな', emoji:'🐤', color:'#ffb300' },
];

/* ===== ステージ =====
   F=すすむ B=もどる A=もう1かい R=おやすみ */
const F=n=>({type:'forward',n,icon:'🚀',label:n+'すすむ'});
const B=n=>({type:'back',n,icon:'🐌',label:n+'もどる'});
const A=()=>({type:'again',icon:'🔁',label:'もう1かい'});
const R=()=>({type:'rest',icon:'😴',label:'おやすみ'});

const STAGES = [
  { name:'こうえん', icon:'🌳', kind:'park', cells:40,
    theme:{ sky:'linear-gradient(#79c6ff 0%,#b7e6ff 55%,#ddf5ff 100%)',
            ground:'#c58b52', turf:'#7ec24a', hill:'#a6dd7a' },
    events:{ 4:F(2), 8:R(), 12:A(), 16:B(2), 20:F(3), 24:A(), 28:B(2), 31:B(3), 32:F(2), 34:R(), 36:R(), 37:B(2) } },
  { name:'うみ', icon:'🌊', kind:'sea', cells:44,
    theme:{ sky:'linear-gradient(#0c7fbd 0%,#1bb9d6 42%,#91e4df 72%,#e8d58b 100%)',
            ground:'#d8b15f', turf:'#44c7a4', hill:'#63d4cf' },
    events:{ 3:F(2), 7:B(2), 11:A(), 15:R(), 19:F(3), 23:B(3), 27:A(), 31:F(2), 35:R(), 36:B(2), 39:F(2), 40:R(), 42:B(3) } },
  { name:'やま', icon:'⛰️', kind:'mountain', cells:48,
    theme:{ sky:'linear-gradient(#8fb7e8 0%,#cfe3f7 55%,#eef7ff 100%)',
            ground:'#8a6b4f', turf:'#8fbf5f', hill:'#b5c9a2' },
    events:{ 4:B(2), 8:F(2), 12:R(), 16:A(), 20:B(3), 24:F(3), 28:R(), 32:A(), 36:B(2), 39:B(2), 40:F(2), 42:R(), 44:A(), 45:B(3) } },
];
let stage = STAGES[0];

/* ===== 横スクロール（マリオ風）コース ===== */
const SVGNS='http://www.w3.org/2000/svg';
const board=document.getElementById('board');
let world=null;
let W,H,N,centers=[];
const CELL_FILL={forward:'#a5e88a',back:'#ffc078',again:'#ffe066',rest:'#8ecbff'};

function svg(tag,attrs,text){ const e=document.createElementNS(SVGNS,tag);
  for(const k in attrs) e.setAttribute(k,attrs[k]); if(text!=null) e.textContent=text; return e; }

// 地面のたかさ（ゆるやかな丘）
function surf(x){ return 430 - Math.sin(x*0.0016)*70 - Math.sin(x*0.0055)*22; }

function cloud(x,y,s){ return `<g transform="translate(${x},${y}) scale(${s})" fill="#ffffff" opacity="0.95">
  <ellipse cx="0" cy="0" rx="70" ry="42"/><ellipse cx="55" cy="10" rx="55" ry="34"/><ellipse cx="-55" cy="10" rx="50" ry="30"/></g>`; }

function parkDecor(x,n){
  const y=surf(x);
  if(n%3===0) return `<g transform="translate(${x},${y-68})">
    <rect x="-95" y="4" width="190" height="16" rx="8" fill="#8d6e63"/>
    <rect x="-76" y="20" width="18" height="60" fill="#795548"/><rect x="58" y="20" width="18" height="60" fill="#795548"/>
    <circle cx="-118" cy="-24" r="42" fill="#52b84f"/><circle cx="-82" cy="-52" r="46" fill="#68c95d"/><circle cx="-48" cy="-20" r="38" fill="#52b84f"/>
    <rect x="-89" y="4" width="16" height="78" fill="#8b5a2b"/>
    <path d="M55 -78 L115 42 L-5 42 Z" fill="#ff7043" stroke="#fff" stroke-width="6"/>
    <rect x="24" y="42" width="64" height="38" fill="#90caf9" stroke="#fff" stroke-width="5"/>
  </g>`;
  if(n%3===1) return `<g transform="translate(${x},${y-82})">
    <rect x="-120" y="0" width="14" height="134" rx="6" fill="#7b5e57"/><rect x="98" y="0" width="14" height="134" rx="6" fill="#7b5e57"/>
    <rect x="-124" y="0" width="238" height="14" rx="7" fill="#7b5e57"/>
    <line x1="-58" y1="14" x2="-75" y2="86" stroke="#5d4037" stroke-width="6"/>
    <line x1="-12" y1="14" x2="-29" y2="86" stroke="#5d4037" stroke-width="6"/>
    <rect x="-86" y="86" width="70" height="20" rx="8" fill="#ffca28"/>
    <circle cx="68" cy="62" r="48" fill="none" stroke="#ef5350" stroke-width="15"/>
    <circle cx="68" cy="62" r="20" fill="none" stroke="#fff" stroke-width="8"/>
  </g>`;
  return `<g transform="translate(${x},${y-78})">
    <path d="M-126 110 C-82 28 -20 -4 68 12" fill="none" stroke="#ffb74d" stroke-width="22" stroke-linecap="round"/>
    <path d="M-62 88 C-24 34 30 26 74 34" fill="none" stroke="#fff8e1" stroke-width="10" stroke-linecap="round"/>
    <rect x="40" y="22" width="76" height="34" rx="10" fill="#4fc3f7" stroke="#fff" stroke-width="6"/>
    <rect x="94" y="52" width="18" height="84" fill="#0288d1"/>
    <circle cx="-124" cy="106" r="18" fill="#8bc34a"/><circle cx="-86" cy="96" r="24" fill="#66bb6a"/>
  </g>`;
}

function mountainDecor(x,n){
  const y=surf(x);
  if(n%3===0) return `<g transform="translate(${x},0)">
    <polygon points="-230,${y+30} -80,130 60,${y+42}" fill="#78906e"/>
    <polygon points="-80,130 -20,220 -118,218" fill="#f5f7f5" opacity="0.95"/>
    <polygon points="-10,${y+70} 150,95 320,${y+78}" fill="#5f7f5a"/>
    <polygon points="150,95 208,210 98,206" fill="#f5f7f5" opacity="0.95"/>
  </g>`;
  if(n%3===1) return `<g transform="translate(${x},${y-40})">
    <path d="M-155 108 C-88 46 -8 44 72 108" fill="none" stroke="#8d6e63" stroke-width="18" stroke-linecap="round"/>
    <path d="M-145 108 L-115 60 M-92 108 L-55 42 M-36 108 L-4 42 M22 108 L52 58" stroke="#5d4037" stroke-width="8" stroke-linecap="round"/>
    <rect x="-170" y="98" width="260" height="18" rx="9" fill="#6d4c41"/>
    <path d="M-210 138 C-120 104 -42 174 48 134 C100 110 144 116 184 134 L184 186 L-210 186 Z" fill="#5dade2" opacity="0.86"/>
  </g>`;
  return `<g transform="translate(${x},${y-105})">
    <path d="M-150 210 C-92 170 -56 108 4 72 C52 44 106 28 164 20" fill="none" stroke="#42a5f5" stroke-width="28" stroke-linecap="round"/>
    <path d="M-152 208 C-82 184 -28 122 26 86" fill="none" stroke="#e3f2fd" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
    <polygon points="-38,60 -12,8 16,62" fill="#2e7d32"/><rect x="-17" y="58" width="10" height="38" fill="#6d4c41"/>
    <polygon points="86,46 116,-12 146,50" fill="#388e3c"/><rect x="111" y="48" width="11" height="48" fill="#6d4c41"/>
  </g>`;
}

function seaDecor(x,n){
  const y=surf(x);
  if(n%4===0) return `<g transform="translate(${x},0)">
    <text x="-130" y="145" font-size="62">🐬</text>
    <circle cx="52" cy="95" r="12" fill="#d9fbff" opacity="0.75"/><circle cx="90" cy="62" r="8" fill="#d9fbff" opacity="0.7"/>
    <text x="160" y="250" font-size="48">🐠</text>
  </g>`;
  if(n%4===1) return `<g transform="translate(${x},${y+36})">
    <text x="-120" y="88" font-size="54">🦀</text>
    <text x="52" y="78" font-size="58">🦞</text>
    <path d="M-190 116 C-168 70 -144 70 -122 116 M-74 118 C-52 66 -28 66 -8 118 M132 118 C150 64 174 64 194 118" fill="none" stroke="#2fbf71" stroke-width="12" stroke-linecap="round"/>
  </g>`;
  if(n%4===2) return `<g transform="translate(${x},0)">
    <text x="-168" y="198" font-size="46">🐟</text><text x="-24" y="134" font-size="44">🐡</text><text x="116" y="214" font-size="50">🐠</text>
    <circle cx="-80" cy="88" r="9" fill="#d9fbff" opacity="0.75"/><circle cx="-50" cy="58" r="6" fill="#d9fbff" opacity="0.7"/><circle cx="86" cy="106" r="10" fill="#d9fbff" opacity="0.75"/>
  </g>`;
  return `<g transform="translate(${x},${y+42})">
    <path d="M-178 122 C-152 72 -126 72 -100 122 M-132 126 C-106 72 -80 72 -54 126" fill="none" stroke="#ff7043" stroke-width="12" stroke-linecap="round"/>
    <circle cx="-150" cy="134" r="20" fill="#ff8a65"/><circle cx="-104" cy="136" r="16" fill="#ffcc80"/>
    <path d="M72 132 C92 70 116 70 136 132 M122 134 C142 78 166 78 186 134" fill="none" stroke="#7e57c2" stroke-width="12" stroke-linecap="round"/>
  </g>`;
}

function stageDecor(x,n){
  if(stage.kind==='park') return parkDecor(x,n);
  if(stage.kind==='mountain') return mountainDecor(x,n);
  if(stage.kind==='sea') return seaDecor(x,n);
  return '';
}

// かんばん（ポール＋ボード）
function sign(cx,topY,fill,icon,label){
  const g=svg('g',{});
  const w=Math.max(120,[...label].length*30+44), by=topY-172, h=82;
  g.appendChild(svg('rect',{x:cx-7,y:topY-158,width:14,height:158,fill:'#a9742f'}));
  g.appendChild(svg('rect',{x:cx-w/2,y:by-h/2,width:w,height:h,rx:16,fill,stroke:'#fff','stroke-width':6,filter:'url(#sh)'}));
  g.appendChild(svg('text',{x:cx,y:by-15,'font-size':40,'text-anchor':'middle','dominant-baseline':'central'},icon));
  g.appendChild(svg('text',{x:cx,y:by+23,'font-size':26,'text-anchor':'middle','dominant-baseline':'central',fill:'#4e342e','font-weight':'bold'},label));
  return g;
}

function buildBoard(){
  N=stage.cells; H=620; const M=200, gap=230;
  W=M*2+(N-1)*gap;
  centers=[];
  for(let i=0;i<N;i++){ const x=M+i*gap; centers.push({x, y:surf(x)-6}); }

  // うしろの飾り（ステージごとの景色）
  let dec='';
  if(stage.kind!=='sea'){
    for(let x=180;x<W;x+=780) dec+=`<ellipse cx="${x}" cy="${surf(x)+140}" rx="440" ry="250" fill="${stage.theme.hill}" opacity="0.6"/>`;
    for(let x=340;x<W;x+=880) dec+=cloud(x, 110+((Math.floor(x/880))%2)*70, 0.9);
  } else {
    for(let x=120;x<W;x+=360) dec+=`<circle cx="${x}" cy="${80+(x%500)/8}" r="${10+(x%4)*4}" fill="#d9fbff" opacity="0.45"/>`;
  }
  for(let x=520,n=0;x<W;x+=620,n++) dec+=stageDecor(x,n);
  if(stage.kind!=='sea'){
    for(let x=560;x<W;x+=690){ const y=surf(x); dec+=`<g transform="translate(${x},${y})"><ellipse cx="-34" cy="2" rx="40" ry="30" fill="#66bb46"/><ellipse cx="22" cy="-8" rx="48" ry="38" fill="#7ccf5a"/><ellipse cx="66" cy="4" rx="34" ry="26" fill="#66bb46"/></g>`; }
  }

  // じめん（土＋しばふ）
  const stp=50;
  let gd=`M0 ${H} L0 ${surf(0)}`; for(let x=stp;x<=W;x+=stp) gd+=` L${x} ${surf(x)}`; gd+=` L${W} ${H} Z`;
  let gl=`M0 ${surf(0)}`; for(let x=stp;x<=W;x+=stp) gl+=` L${x} ${surf(x)}`;

  board.innerHTML=`<div class="sun"></div><div id="world"><svg id="bsvg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><filter id="sh"><feDropShadow dx="0" dy="6" stdDeviation="4" flood-opacity="0.3"/></filter></defs>
    ${dec}
    <path d="${gd}" fill="${stage.theme.ground}"/>
    <path d="${gl}" fill="none" stroke="${stage.theme.turf}" stroke-width="28" stroke-linejoin="round" stroke-linecap="round"/>
  </svg></div>`;
  board.style.background=stage.theme.sky;
  world=board.querySelector('#world');
  world.style.width=(board.clientHeight*W/H)+'px';
  const s=world.querySelector('#bsvg');

  // ① ふつうのマス（あしば ブロック）
  for(let i=0;i<N;i++){
    if(i===0||i===N-1||stage.events[i]) continue;
    const c=centers[i];
    s.appendChild(svg('rect',{x:c.x-42,y:c.y,width:84,height:70,rx:14,fill:'#e6b877',stroke:'#b07a34','stroke-width':6}));
    s.appendChild(svg('rect',{x:c.x-42,y:c.y,width:84,height:16,rx:8,fill:'#f3d6a2'}));
  }
  // ② スタート・ゴール・イベント（かんばん＋あしば）
  for(let i=0;i<N;i++){
    if(!(i===0||i===N-1||stage.events[i])) continue;
    const c=centers[i];
    s.appendChild(svg('rect',{x:c.x-46,y:c.y,width:92,height:70,rx:14,fill:'#d9a066',stroke:'#a9742f','stroke-width':6}));
    s.appendChild(svg('rect',{x:c.x-46,y:c.y,width:92,height:16,rx:8,fill:'#efc890'}));
    if(i===0)         s.appendChild(sign(c.x,c.y,'#7ed957','🏠','スタート'));
    else if(i===N-1)  s.appendChild(sign(c.x,c.y,'#ff8fbf','🏁','ゴール'));
    else { const ev=stage.events[i]; s.appendChild(sign(c.x,c.y,CELL_FILL[ev.type],ev.icon,ev.label)); }
  }
}

// カメラ：ゆびした プレイヤーが すこし左になるように 横スクロール
function scrollTo(x){
  if(!world) return;
  const bw=board.clientWidth, ww=world.clientWidth;
  let tx=bw*0.4 - (x/W)*ww;
  tx=Math.max(bw-ww, Math.min(0, tx));
  world.style.transform=`translateX(${tx}px)`;
}

/* ===== ゲーム じょうたい ===== */
const diceWrap=document.getElementById('diceWrap');
const cube=document.getElementById('cube');
const hint=document.getElementById('hint');

/* サイコロ（3Dキューブ）を つくる */
const PIP_MAP={1:[5],2:[1,9],3:[1,5,9],4:[1,3,7,9],5:[1,3,5,7,9],6:[1,3,4,6,7,9]};
const DICE_FACES=[['front f1',1],['back',6],['right',3],['left',4],['top',2],['bottom',5]];
function buildDice(){
  cube.innerHTML='';
  DICE_FACES.forEach(([cls,num])=>{
    const f=document.createElement('div'); f.className='face '+cls;
    for(let i=1;i<=9;i++){
      const cell=document.createElement('div'); cell.className='cell';
      if(PIP_MAP[num].includes(i)){ const p=document.createElement('div'); p.className='pip'; cell.appendChild(p); }
      f.appendChild(cell);
    }
    cube.appendChild(f);
  });
}
const turnEl=document.getElementById('turn');
const statusEl=document.getElementById('status');
let players=[], selectedKeys=[], turnIdx=0, busy=false;
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

/* せってい */
function buildCards(){
  const box=document.getElementById('cards'); box.innerHTML='';
  ALL_PLAYERS.forEach(p=>{
    const el=document.createElement('div');
    el.className='pcard'+(selectedKeys.includes(p.key)?' sel':'');
    el.style.background=p.color+'33';
    el.innerHTML=`<div class="face">${p.emoji}</div><div class="nm" style="color:${p.color}">${p.name}</div><div class="chk">${selectedKeys.includes(p.key)?'✔':''}</div>`;
    el.onclick=()=>{
      if(selectedKeys.includes(p.key)) selectedKeys=selectedKeys.filter(k=>k!==p.key);
      else if(selectedKeys.length<4) selectedKeys.push(p.key);
      buildCards(); document.getElementById('startBtn').disabled=selectedKeys.length<2;
    };
    box.appendChild(el);
  });
}
let selStage=0;
function buildStageCards(){
  const bx=document.getElementById('stageCards'); bx.innerHTML='';
  STAGES.forEach((st,i)=>{
    const el=document.createElement('div');
    el.className='pcard'+(i===selStage?' sel':'');
    el.innerHTML=`<div class="face">${st.icon}</div><div class="nm">${st.name}</div><div class="chk">${i===selStage?'✔':''}</div>`;
    el.onclick=()=>{ selStage=i; buildStageCards(); };
    bx.appendChild(el);
  });
}
function showSetup(){
  document.getElementById('win').classList.remove('show');
  document.getElementById('setup').classList.add('show');
  buildCards(); buildStageCards();
  document.getElementById('startBtn').disabled=selectedKeys.length<2;
}
function startGame(){
  if(selectedKeys.length<2) return;
  stage=STAGES[selStage];
  document.getElementById('setup').classList.remove('show');
  document.getElementById('win').classList.remove('show');
  players=ALL_PLAYERS.filter(p=>selectedKeys.includes(p.key)).map(p=>({...p,pos:0,skip:false}));
  turnIdx=0; buildBoard(); buildDice(); makeTokens(); positionTokens(); updateTurnUI();
  hint.textContent=''; busy=false; diceWrap.classList.remove('off');
}
function replay(){ startGame(); }

/* コマ */
let tokenEls=[];
function makeTokens(){
  document.querySelectorAll('.token').forEach(t=>t.remove());
  tokenEls=players.map(p=>{ const t=document.createElement('div');
    t.className='token'; t.style.background=p.color; t.textContent=p.emoji;
    world.appendChild(t); return t; });
}
const OFF={1:[[0,0]],2:[[-66,0],[66,0]],3:[[-66,0],[66,0],[0,-150]],4:[[-90,0],[90,0],[-46,-150],[46,-150]]};
function positionTokens(){
  const groups={};
  players.forEach((p,i)=>{ (groups[p.pos]=groups[p.pos]||[]).push(i); });
  Object.values(groups).forEach(idxs=>{
    const offs=OFF[idxs.length]||OFF[4];
    idxs.forEach((pi,k)=>{
      const c=centers[players[pi].pos], o=offs[k]||[0,0], el=tokenEls[pi];
      el.style.left=((c.x+o[0])/W*100)+'%';
      el.style.top =((c.y+o[1])/H*100)+'%';
    });
  });
}

/* ひょうじ */
function updateTurnUI(){
  const p=players[turnIdx];
  turnEl.textContent=`${p.emoji} ${p.name} の ばん！`;
  turnEl.style.background=p.color;
  diceWrap.style.filter=`drop-shadow(0 1.2vmin 0.8vmin ${p.color}77)`;
  tokenEls.forEach((t,i)=>t.classList.toggle('current',i===turnIdx));
  if(centers.length) scrollTo(centers[p.pos].x);
  statusEl.innerHTML='';
  players.forEach((pl,i)=>{
    const chip=document.createElement('div');
    chip.className='chip'+(i===turnIdx?' act':'');
    chip.innerHTML=`<span class="dot" style="background:${pl.color}"></span>${pl.emoji}${pl.name}${pl.pos>=N-1?' 🏁':''}`;
    statusEl.appendChild(chip);
  });
}

/* おと */
let actx;
function beep(f,dur=0.12,type='square'){ try{
  actx=actx||new (window.AudioContext||window.webkitAudioContext)();
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type;o.frequency.value=f;o.connect(g);g.connect(actx.destination);
  g.gain.setValueAtTime(0.15,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
  o.start();o.stop(actx.currentTime+dur);}catch(e){} }

/* サイコロ */
const REST={1:[0,0],2:[-90,0],3:[0,-90],4:[0,90],5:[90,0],6:[0,180]};
let spinX=0, spinY=0;
const scene=document.querySelector('.scene');
// 1〜6が かならず 同じ確率になるサイコロ（crypto乱数＋偏りを捨てる）
function d6(){
  if(window.crypto&&crypto.getRandomValues){
    const b=new Uint8Array(1);
    do{ crypto.getRandomValues(b); }while(b[0]>=252); // 252=6*42 → 余りの偏りなし
    return 1+(b[0]%6);
  }
  return 1+Math.floor(Math.random()*6);
}
async function animateDice(){
  const n=d6();
  const [bx,by]=REST[n];
  // まわす回数（360の倍数ぶんは目が変わらないので、目をキープしたまま何回転もさせる）
  spinX += 4 + Math.floor(Math.random()*3);
  spinY += 3 + Math.floor(Math.random()*3);
  scene.classList.remove('throw'); void scene.offsetWidth; scene.classList.add('throw');
  cube.style.transform = `rotateX(${bx + 360*spinX}deg) rotateY(${by + 360*spinY}deg)`;
  // ころがる音
  for(let i=0;i<6;i++) setTimeout(()=>beep(260+Math.random()*380,.05,'square'), i*140);
  await sleep(1200);
  scene.classList.remove('throw');
  return n;
}

/* うごく */
async function moveSteps(p,k,dir){
  for(let s=0;s<k;s++){
    if(dir>0&&p.pos>=N-1) break;
    if(dir<0&&p.pos<=0) break;
    p.pos+=dir; positionTokens(); beep(dir>0?640+p.pos*8:400,.12); updateTurnUI(); await sleep(480);
  }
}
async function applyEvent(p,ev){
  hint.textContent=ev.icon+' '+ev.label; beep(880,.15,'triangle'); await sleep(600);
  if(ev.type==='forward'){ await moveSteps(p,ev.n,+1); return false; }
  if(ev.type==='back'){ await moveSteps(p,ev.n,-1); return false; }
  if(ev.type==='rest'){ p.skip=true; return false; }
  if(ev.type==='again'){ return true; }
  return false;
}
function nextTurn(){
  for(let guard=0;guard<players.length;guard++){
    turnIdx=(turnIdx+1)%players.length;
    if(players[turnIdx].skip){ players[turnIdx].skip=false; hint.textContent=`${players[turnIdx].name} は おやすみ 😴`; }
    else break;
  }
}
async function roll(){
  if(busy) return; busy=true; diceWrap.classList.add('off');
  const p=players[turnIdx]; hint.textContent='ころころ…';
  const n=await animateDice(); hint.textContent=`${n} すすむ！`; await sleep(300);
  await moveSteps(p,n,+1);
  if(p.pos>=N-1) return win(p);
  let again=false; const ev=stage.events[p.pos];
  if(ev) again=await applyEvent(p,ev);
  if(p.pos>=N-1) return win(p);
  if(!again) nextTurn(); else hint.textContent=`${p.name} もう1かい！`;
  updateTurnUI(); busy=false; diceWrap.classList.remove('off');
}

/* ゴール */
function win(p){
  document.getElementById('winWho').textContent=`${p.emoji} ${p.name} が ゴール！`;
  document.getElementById('winWho').style.color=p.color;
  document.getElementById('win').classList.add('show');
  [523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>beep(f,.25,'triangle'),i*160));
  for(let i=0;i<50;i++){ const c=document.createElement('div'); c.className='confetti';
    c.textContent=['🎉','⭐','🎈','🌟','🍬','🎊','🏆'][i%7];
    c.style.left=Math.random()*100+'vw';
    c.style.animationDuration=(2+Math.random()*2.5)+'s';
    c.style.animationDelay=(Math.random()*0.8)+'s';
    document.body.appendChild(c); setTimeout(()=>c.remove(),5500); }
}

// がめんの むきが かわったら はば を けいさんしなおす
window.addEventListener('resize',()=>{
  if(!world||!players.length) return;
  world.style.width=(board.clientHeight*W/H)+'px';
  positionTokens();
  scrollTo(centers[players[turnIdx].pos].x);
});

diceWrap.addEventListener('click',roll);
buildCards(); buildStageCards();
</script>
